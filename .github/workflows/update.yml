name: Update MLB Stats

on:
  schedule:
    # Roda todo dia às 10h UTC (7h horário de Brasília) — busca jogos do dia anterior
    - cron: "0 10 * * *"
    # Roda todo domingo às 11h UTC — reprocessa os últimos 7 dias
    - cron: "0 11 * * 0"
  workflow_dispatch:
    inputs:
      date:
        description: "Data específica para reprocessar (YYYY-MM-DD). Deixe vazio para rodar o fluxo normal."
        required: false
        default: ""
      reprocess_days:
        description: "Número de dias para reprocessar (padrão: 1). Use 7 para reprocessamento semanal."
        required: false
        default: "1"
      start_date:
        description: "Início do intervalo a reprocessar (YYYY-MM-DD). Use junto com end_date."
        required: false
        default: ""
      end_date:
        description: "Fim do intervalo a reprocessar (YYYY-MM-DD). Use junto com start_date."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas numpy

      - name: Definir datas a processar
        id: dates
        run: |
          python3 << 'EOF'
          import os
          from datetime import date, timedelta

          # Verifica se foi disparado manualmente com data específica
          manual_date = os.environ.get("MANUAL_DATE", "").strip()
          start_date  = os.environ.get("START_DATE", "").strip()
          end_date    = os.environ.get("END_DATE", "").strip()
          reprocess_days_raw = os.environ.get("REPROCESS_DAYS", "").strip()
          reprocess_days = int(reprocess_days_raw) if reprocess_days_raw else 1
          is_sunday = date.today().weekday() == 6

          if start_date and end_date:
              # Reprocessa um intervalo explícito (ex: temporada inteira)
              d0 = date.fromisoformat(start_date)
              d1 = date.fromisoformat(end_date)
              if d0 > d1:
                  d0, d1 = d1, d0
              n_days = (d1 - d0).days + 1
              dates = [(d0 + timedelta(days=i)).strftime("%Y-%m-%d") for i in range(n_days)]
          elif manual_date:
              dates = [manual_date]
          elif is_sunday or reprocess_days > 1:
              # Reprocessa os últimos N dias
              today = date.today()
              n = reprocess_days if reprocess_days > 1 else 7
              dates = [(today - timedelta(days=i)).strftime("%Y-%m-%d") for i in range(1, n + 1)]
          else:
              # Busca só ontem
              dates = [(date.today() - timedelta(days=1)).strftime("%Y-%m-%d")]

          print(f"Datas a processar ({len(dates)}): {dates[:5]}{'...' if len(dates) > 5 else ''}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"dates={','.join(dates)}\n")
          EOF
        env:
          MANUAL_DATE: ${{ github.event.inputs.date }}
          REPROCESS_DAYS: ${{ github.event.inputs.reprocess_days }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}

      - name: Buscar play-by-play
        run: |
          IFS=',' read -ra DATES <<< "${{ steps.dates.outputs.dates }}"
          for d in "${DATES[@]}"; do
            echo "→ Processando $d..."
            python scripts/fetch_data.py --date "$d"
          done

      - name: Agregar estatísticas
        run: python scripts/build_stats.py

      - name: Gerar HTML
        run: python scripts/build_html.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: atualiza stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
