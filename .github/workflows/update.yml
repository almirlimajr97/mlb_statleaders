name: Update MLB Stats

on:
  schedule:
    # Roda todo dia às 8h UTC (5h horário de Brasília) — busca jogos do dia anterior
    - cron: "0 8 * * *"
    # Roda todo domingo às 9h UTC (6h horário de Brasília) — reprocessa os últimos 10 dias
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      date:
        description: "Data específica para reprocessar (YYYY-MM-DD). Deixe vazio para rodar o fluxo normal."
        required: false
        default: ""
      reprocess_days:
        description: "Número de dias para reprocessar (padrão: 1). Use 10 para reprocessamento semanal."
        required: false
        default: "1"
      start_date:
        description: "Início do intervalo a reprocessar (YYYY-MM-DD). Use junto com end_date."
        required: false
        default: ""
      end_date:
        description: "Fim do intervalo a reprocessar (YYYY-MM-DD). Use junto com start_date."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas numpy pyarrow

      - name: Definir datas a processar
        id: dates
        run: |
          python3 << 'EOF'
          import os
          from datetime import date, timedelta

          manual_date = os.environ.get("MANUAL_DATE", "").strip()
          start_date  = os.environ.get("START_DATE", "").strip()
          end_date    = os.environ.get("END_DATE", "").strip()
          reprocess_days_raw = os.environ.get("REPROCESS_DAYS", "").strip()
          reprocess_days = int(reprocess_days_raw) if reprocess_days_raw else 1
          is_sunday = date.today().weekday() == 6

          if start_date and end_date:
              d0 = date.fromisoformat(start_date)
              d1 = date.fromisoformat(end_date)
              if d0 > d1:
                  d0, d1 = d1, d0
              n_days = (d1 - d0).days + 1
              dates = [(d0 + timedelta(days=i)).strftime("%Y-%m-%d") for i in range(n_days)]
              send_email = "false"
          elif manual_date:
              dates = [manual_date]
              send_email = "true"
          elif is_sunday or reprocess_days > 1:
              today = date.today()
              n = reprocess_days if reprocess_days > 1 else 10
              dates = [(today - timedelta(days=i)).strftime("%Y-%m-%d") for i in range(1, n + 1)]
              send_email = "false"
          else:
              dates = [(date.today() - timedelta(days=1)).strftime("%Y-%m-%d")]
              send_email = "true"

          print(f"Datas a processar ({len(dates)}): {dates[:5]}{'...' if len(dates) > 5 else ''}")
          print(f"Enviar e-mail: {send_email}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"dates={','.join(dates)}\n")
              f.write(f"send_email={send_email}\n")
          EOF
        env:
          MANUAL_DATE: ${{ github.event.inputs.date }}
          REPROCESS_DAYS: ${{ github.event.inputs.reprocess_days }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}

      - name: Buscar play-by-play
        run: |
          IFS=',' read -ra DATES <<< "${{ steps.dates.outputs.dates }}"
          fail_count=0
          for d in "${DATES[@]}"; do
            echo "→ Processando $d..."
            if ! python scripts/fetch_data.py --date "$d"; then
              echo "  ⚠ Falha ao processar $d, seguindo para a próxima data."
              fail_count=$((fail_count + 1))
            fi
          done
          echo "Concluído. $fail_count data(s) com falha de $((${#DATES[@]})) processadas."

      - name: Agregar estatísticas
        run: python scripts/build_stats.py

      - name: Gerar HTML
        run: python scripts/build_html.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: atualiza stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          if ! git pull --rebase origin main; then
            echo "⚠ Conflito ao integrar mudanças remotas. Abortando rebase."
            git rebase --abort || true
            exit 1
          fi
          git push

      - name: Enviar report diário por e-mail
        if: steps.dates.outputs.send_email == 'true'
        run: |
          DATE="${{ steps.dates.outputs.dates }}"
          python scripts/send_report.py --date "$DATE"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL:   ${{ secrets.REPORT_EMAIL }}
